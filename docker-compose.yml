services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - laravel

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: php
    env_file:
      - .env
    environment:
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/database.sqlite
    volumes:
      - storage_data:/var/www/html/storage
      # Artisan (e.g. key:generate) reads/writes .env on disk; env_file alone does not create this file.
      - ./.env:/var/www/html/.env
    restart: unless-stopped
    networks:
      - laravel

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: php
    env_file:
      - .env
    environment:
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/database.sqlite
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3"]
    volumes:
      - storage_data:/var/www/html/storage
      - ./.env:/var/www/html/.env
    restart: unless-stopped
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  storage_data:
