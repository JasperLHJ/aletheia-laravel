# DigitalOcean App Platform spec — use with: doctl apps create --spec .do/app.yaml
# (or import in the control panel). Replace github.repo with your org/repo; set APP_KEY as a SECRET
# in the UI or via doctl. Do not commit real secrets to this file.
#
# Build path: App Platform auto-detects the root Dockerfile and builds the image
# defined there (single container running supervisord -> nginx + php-fpm + schedule:work).

name: aletheia-laravel
region: sgp

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

services:
  - name: web
    instance_count: 1
    # Single instance only when using SQLite (one database file per app instance, ephemeral).
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: jasperlhj/aletheia-laravel
      branch: main
      deploy_on_push: true
    http_port: 8080
    health_check:
      http_path: /up
      initial_delay_seconds: 45
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: sqlite
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
    # In the App Platform UI (or in this file before apply), set at minimum:
    #   APP_KEY (type SECRET, from `php artisan key:generate --show`)
    #   APP_URL (canonical public URL, e.g. https://your-app.ondigitalocean.app)
    # Copy other variables from .env.example (Instagram, SEO, BLOG_*, etc.).
    # The container also runs `php artisan schedule:work` via supervisord (see
    # docker/supervisor/supervisord.conf), so no separate worker component is needed.
    # Migrations + seeds run on every container start (docker/php/docker-entrypoint.sh).
